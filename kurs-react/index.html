<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Czat API</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body style="font-family: sans-serif; background-color: #0000ff; padding: 20px;">

    <div id="kontener-glowny" style="max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        
        <div id="login-screen">
            <h2 style="text-align: center;">Wpisz swój nick</h2>
            <input type="text" id="input-nick" placeholder="Twój nick..." style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;">
            <button id="btn-wejdz" style="width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">Wejdź na czat</button>
        </div>

        <div id="chat-interface" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0;">Czat online</h3>
                <button id="btn-wyloguj" style="background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Wyloguj</button>
            </div>

            <div id="chat-messages" style="height: 300px; overflow-y: auto; border: 1px solid #eee; background: #fafafa; padding: 10px; margin-bottom: 10px; border-radius: 5px;">
                </div>

            <form id="formularz-wiadomosci" style="display: flex; gap: 5px;">
                <input type="text" id="input-wiadomosc" placeholder="Napisz coś..." required style="flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <button type="submit" style="background: #28a745; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Wyślij</button>
            </form>
        </div>

    </div>

    <script src="./js/app.js"></script>
</body>
</html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#8e44ad">

<!-- Podpięcie dowodu osobistego (manifestu) -->
<link rel="manifest" href="manifest.json">
<!-- Podpięcie Twojej logiki -->
<script src="app.js"></script>

<!-- Rejestracja pracownika w tle (Service Workera) -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('✅ Service Worker działa!'))
                .catch(err => console.log('❌ Błąd Service Workera:', err));
        });
    }
</script>
</head>
