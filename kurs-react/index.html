<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Shoutbox - Klasowe API</title>
    
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <header>
        <h1>Klasowy Shoutbox</h1>
    </header>

    <main id="kontener-aplikacji">
        
        <div id="login-screen">
            <h3>Zanim wejdziesz, przedstaw się:</h3>
            <input type="text" id="input-nick" placeholder="Wpisz swój nick...">
            <button id="btn-wejdz">Wejdź na czat</button>
        </div>

        <div id="chat-interface" style="display: none;">
            <h2>Witaj na czacie!</h2>
            
            <div id="chat-messages" style="border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #f9f9f9;">
                </div>

            <form id="formularz-wiadomosci">
                <input type="text" id="input-wiadomosc" placeholder="Napisz wiadomość..." required>
                <button type="submit">Wyślij</button>
            </form>
        </div>

    </main>

    <script src="./js/app.js"></script>

</body>
</html>
