<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Czat API</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div id="kontener-glowny">
        
        <div id="login-screen">
            <h2>Wpisz swój nick</h2>
            <input type="text" id="input-nick" placeholder="Twój nick...">
            <button id="btn-wejdz">Wejdź na czat</button>
        </div>

        <div id="chat-interface" style="display: none;">
            <div id="chat-header">
                <h3>Czat online</h3>
                <button id="btn-wyloguj">Wyloguj</button>
            </div>

            <div id="chat-messages">
                </div>

            <form id="formularz-wiadomosci">
                <input type="text" id="input-wiadomosc" placeholder="Napisz coś..." required>
                <button type="submit">Wyślij</button>
            </form>
        </div>

    </div>

    <script src="./js/app.js"></script>
</body>
</html>
